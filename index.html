<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>知识卡片生成器（750×906）</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --page-bg: linear-gradient(180deg, #eef4fb 0%, #e6eef8 100%);
      --panel-bg: rgba(255, 255, 255, 0.82);
      --panel-border: rgba(155, 183, 212, 0.42);
      --text-main: #123d68;
      --text-sub: #5f7f9f;
      --text-soft: #8ca4be;
      --brand-blue: #17538c;
      --brand-blue-deep: #0e4679;
      --banner-bg: linear-gradient(180deg, #fdfefe 0%, #f5f9fd 100%);
      --banner-stroke: rgba(135, 172, 205, 0.38);
      --banner-shadow: 0 24px 50px rgba(60, 109, 153, 0.18);
      --title-main: #0b4f86;
      --title-accent: #1d6ca5;
      --icon-accent: #56a8dd;
      --badge-bg: linear-gradient(180deg, #eff4f8 0%, #d8e4ee 100%);
      --badge-text: #163e67;
      --slogan-bg: linear-gradient(90deg, #edf3f8 0%, #dce7f2 50%, #eef3f8 100%);
      --slogan-text: #173f68;
      --cta-bg: linear-gradient(180deg, #14558d 0%, #0d4578 100%);
      --cta-shadow: 0 16px 28px rgba(14, 70, 121, 0.28);
      --cta-text: #ffffff;
      --cta-arrow-bg: linear-gradient(180deg, #d9e7f8 0%, #b7d0ee 100%);
      --frame-bg: linear-gradient(180deg, #ffffff 0%, #f9fbfd 100%);
      --frame-stroke: rgba(125, 165, 196, 0.42);
      --footer-bg: linear-gradient(180deg, #d7e3ef 0%, #cad8e8 100%);
      --footer-text: #173d65;
    }
    body { min-height: 100vh; background: var(--page-bg); color: var(--text-main); font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif; }
    .app { max-width: 1440px; margin: 0 auto; padding: 28px 20px 40px; }
    .hero { text-align: center; margin-bottom: 22px; }
    .hero h1 { font-size: 34px; line-height: 1.2; font-weight: 800; letter-spacing: 1px; color: var(--brand-blue-deep); margin-bottom: 8px; }
    .hero p { font-size: 15px; color: var(--text-sub); }
    .status-bar { display: flex; justify-content: center; margin-bottom: 18px; }
    .status-chip { display: inline-flex; align-items: center; gap: 10px; padding: 10px 16px; border-radius: 999px; background: rgba(255,255,255,.78); border: 1px solid rgba(162,187,211,.48); color: var(--brand-blue); font-size: 13px; font-weight: 700; box-shadow: 0 10px 24px rgba(89,127,164,.12); backdrop-filter: blur(10px); }
    .workspace { display: grid; grid-template-columns: minmax(720px, 1fr) 440px; gap: 22px; align-items: start; }
    .preview-panel, .editor-panel { background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 28px; box-shadow: 0 18px 42px rgba(83,119,155,.12); backdrop-filter: blur(14px); }
    .preview-panel { padding: 22px; }
    .preview-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
    .preview-title { font-size: 20px; font-weight: 800; color: var(--brand-blue-deep); }
    .preview-note { font-size: 13px; color: var(--text-sub); }
    .preview-stage { display: flex; justify-content: center; align-items: flex-start; padding: 12px 0 18px; overflow: auto; min-height: 780px; }
    .banner { position: relative; width: 750px; height: 906px; overflow: hidden; border-radius: 26px; background: var(--banner-bg); border: 1px solid var(--banner-stroke); box-shadow: var(--banner-shadow); }
    .preview-banner { transform: scale(0.82); transform-origin: top center; margin: 0; }
    .banner::before { content: ""; position: absolute; inset: 0; background: radial-gradient(circle at 18% 12%, rgba(140,190,227,.14), transparent 32%), radial-gradient(circle at 92% 14%, rgba(120,166,207,.10), transparent 26%), linear-gradient(180deg, rgba(255,255,255,.65), rgba(255,255,255,0)); pointer-events: none; }
    .banner-sheen { position: absolute; inset: 18px 18px auto; height: 210px; border-radius: 22px; background: linear-gradient(180deg, rgba(255,255,255,.65), rgba(255,255,255,0)); pointer-events: none; }
    .content { position: relative; z-index: 2; height: 100%; padding: 22px 24px 74px; display: grid; grid-template-rows: 54px 92px minmax(0, 1fr) 54px 86px; row-gap: 14px; }
    .countdown-badge { justify-self: end; align-self: start; display: inline-flex; align-items: center; gap: 10px; padding: 10px 18px; min-height: 54px; border-radius: 0 0 0 22px; background: var(--badge-bg); box-shadow: inset 0 1px 0 rgba(255,255,255,.8); }
    .countdown-badge svg { width: 28px; height: 28px; color: var(--icon-accent); flex-shrink: 0; }
    .countdown-badge span { font-size: 19px; font-weight: 800; color: var(--badge-text); letter-spacing: 1px; }
    .title-block { padding: 0 8px; display: flex; align-items: center; justify-content: center; gap: 16px; flex-wrap: nowrap; min-width: 0; }
    .title-piece { font-size: 54px; line-height: 1; font-weight: 900; color: var(--title-main); letter-spacing: 0; text-shadow: 0 2px 0 rgba(255,255,255,.8); white-space: nowrap; }
    .title-piece.accent { color: var(--title-accent); }
    .title-divider { width: 2px; height: 54px; background: linear-gradient(180deg, rgba(28,98,148,.18), rgba(28,98,148,.5), rgba(28,98,148,.18)); }
    .title-icon { width: 40px; height: 40px; color: var(--icon-accent); filter: drop-shadow(0 4px 10px rgba(86,168,221,.18)); flex-shrink: 0; }
    .frame-wrap { padding: 8px; border-radius: 24px; background: linear-gradient(180deg, rgba(255,255,255,.88), rgba(242,248,252,.9)); border: 1px solid rgba(151,183,210,.4); box-shadow: inset 0 1px 0 rgba(255,255,255,.9), 0 10px 22px rgba(124,158,190,.14); display: flex; flex-direction: column; min-height: 0; }
    .frame-tab { width: fit-content; max-width: calc(100% - 40px); margin: 0 auto 8px; padding: 8px 26px 10px; border-radius: 0 0 18px 18px; background: linear-gradient(180deg, #3180c2 0%, #1d66a8 100%); color: #fff; font-size: 18px; font-weight: 800; letter-spacing: .5px; box-shadow: 0 8px 18px rgba(45,108,165,.2); clip-path: polygon(4% 0, 96% 0, 100% 100%, 0 100%); text-align: center; line-height: 1.2; }
    .placeholder-box { position: relative; width: 100%; height: 404px; flex: 0 0 404px; overflow: hidden; border-radius: 22px; background: var(--frame-bg); border: 1px solid var(--frame-stroke); box-shadow: inset 0 1px 1px rgba(255,255,255,.8), 0 10px 24px rgba(91,132,168,.08); display: flex; align-items: center; justify-content: center; }
    .placeholder-box::before { content: ""; position: absolute; inset: 14px; border-radius: 18px; border: 1px solid rgba(160,191,217,.22); pointer-events: none; }
    .ph-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(30,92,142,.035) 1px, transparent 1px), linear-gradient(90deg, rgba(30,92,142,.035) 1px, transparent 1px); background-size: 42px 42px; pointer-events: none; }
    .placeholder-copy { position: relative; z-index: 2; max-width: 360px; text-align: center; color: var(--text-sub); padding: 22px; border-radius: 18px; background: rgba(255,255,255,.78); border: 1px dashed rgba(118,160,196,.48); box-shadow: 0 10px 24px rgba(117,155,189,.08); }
    .ph-icon { width: 58px; height: 58px; margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; border-radius: 18px; background: linear-gradient(180deg, #eff6fb 0%, #dbe9f5 100%); color: var(--brand-blue); }
    .ph-main { font-size: 22px; font-weight: 800; color: var(--brand-blue-deep); line-height: 1.4; }
    .ph-sub { margin-top: 8px; font-size: 13px; line-height: 1.6; color: var(--text-sub); }
    .uploaded-layer { position: absolute; inset: 0; z-index: 3; cursor: grab; user-select: none; }
    .uploaded-layer:active { cursor: grabbing; }
    .uploaded-layer img { position: absolute; left: 50%; top: 50%; max-width: none; max-height: none; transform: translate(-50%, -50%) translate(var(--dx, 0px), var(--dy, 0px)) scale(var(--scale, 1)); transform-origin: center center; will-change: transform; pointer-events: none; }
    .slogan-bar { margin: 0 12px; padding: 13px 18px; background: var(--slogan-bg); display: flex; align-items: center; justify-content: center; gap: 16px; color: var(--slogan-text); box-shadow: inset 0 1px 0 rgba(255,255,255,.7); overflow: hidden; }
    .slogan-item { font-size: 19px; font-weight: 500; letter-spacing: .3px; white-space: nowrap; }
    .slogan-sep { width: 1px; height: 24px; background: rgba(23,63,104,.2); flex-shrink: 0; }
    .footer-row { display: flex; justify-content: center; align-items: center; }
    .cta-btn { display: inline-flex; align-items: center; gap: 16px; min-width: 0; width: 470px; max-width: 100%; justify-content: center; padding: 16px 28px; border-radius: 999px; background: var(--cta-bg); color: var(--cta-text); box-shadow: var(--cta-shadow); }
    .cta-text { font-size: 24px; font-weight: 900; letter-spacing: .5px; white-space: nowrap; }
    .cta-arrow { width: 48px; height: 48px; border-radius: 50%; background: var(--cta-arrow-bg); display: flex; align-items: center; justify-content: center; color: var(--brand-blue-deep); flex-shrink: 0; box-shadow: inset 0 1px 0 rgba(255,255,255,.7); }
    .cta-arrow svg { width: 22px; height: 22px; }
    .editor-panel { padding: 22px; position: sticky; top: 18px; }
    .panel-title { font-size: 22px; font-weight: 800; color: var(--brand-blue-deep); margin-bottom: 6px; }
    .panel-desc { font-size: 13px; color: var(--text-sub); line-height: 1.6; margin-bottom: 18px; }
    .section-card { padding: 16px; border-radius: 20px; background: rgba(247,250,253,.95); border: 1px solid rgba(180,200,221,.36); margin-bottom: 14px; }
    .section-card h3 { font-size: 15px; font-weight: 800; color: var(--brand-blue); margin-bottom: 12px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    label { display: block; }
    .field-label { display: block; margin-bottom: 6px; font-size: 12px; color: var(--text-sub); font-weight: 700; letter-spacing: .3px; }
    .input { width: 100%; height: 44px; border: 1px solid rgba(176,197,218,.7); border-radius: 14px; background: #fff; padding: 0 14px; font-size: 14px; color: var(--text-main); outline: none; transition: border-color .2s, box-shadow .2s; }
    .input:focus { border-color: rgba(41,111,166,.6); box-shadow: 0 0 0 4px rgba(50,122,179,.12); }
    .mode-selector { display: flex; gap: 8px; padding: 7px; background: #eef4fa; border-radius: 16px; margin-bottom: 14px; }
    .mode-btn, .btn { border: none; cursor: pointer; transition: .2s ease; }
    .mode-btn { flex: 1; height: 42px; border-radius: 12px; background: transparent; color: var(--text-sub); font-size: 14px; font-weight: 700; }
    .mode-btn.active { background: linear-gradient(180deg, #1d6ca5 0%, #155483 100%); color: #fff; box-shadow: 0 8px 18px rgba(26,95,149,.2); }
    .btn-row, .action-row, .slider-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .btn-row { margin-top: 16px; }
    .btn { min-width: 128px; height: 44px; padding: 0 16px; border-radius: 14px; font-size: 14px; font-weight: 800; }
    .btn.primary { background: linear-gradient(180deg, #1d6ca5 0%, #155483 100%); color: #fff; box-shadow: 0 10px 18px rgba(30,98,151,.2); }
    .btn.secondary { background: #fff; color: var(--brand-blue); border: 1px solid rgba(177,198,219,.8); }
    .btn:disabled { opacity: .5; cursor: not-allowed; box-shadow: none; }
    .slider-wrap { margin-top: 8px; }
    .slider-row { justify-content: space-between; }
    input[type="range"] { flex: 1; accent-color: var(--brand-blue); }
    .kbd { display: inline-flex; align-items: center; justify-content: center; min-width: 58px; height: 30px; padding: 0 10px; border-radius: 999px; background: #fff; border: 1px solid rgba(183,202,221,.85); font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-size: 12px; font-weight: 700; color: var(--brand-blue); }
    .multi-image-preview { display: grid; grid-template-columns: repeat(auto-fill, minmax(92px, 1fr)); gap: 10px; margin-top: 14px; }
    .multi-image-item { position: relative; aspect-ratio: 1; border-radius: 14px; overflow: hidden; border: 2px solid transparent; box-shadow: 0 8px 16px rgba(114,149,183,.12); cursor: pointer; background: #fff; }
    .multi-image-item.selected { border-color: var(--brand-blue); }
    .multi-image-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .multi-image-remove { position: absolute; top: 6px; right: 6px; width: 24px; height: 24px; border: none; border-radius: 50%; background: rgba(12,45,74,.72); color: #fff; font-size: 16px; cursor: pointer; }
    .multi-image-empty, .small-note { font-size: 13px; line-height: 1.6; color: var(--text-sub); }
    .generated-box { margin-top: 16px; padding: 14px; border-radius: 20px; background: rgba(247,250,253,.95); border: 1px solid rgba(180,200,221,.36); }
    .generated-box img { width: 100%; height: auto; display: block; border-radius: 14px; border: 1px solid rgba(185,204,223,.8); background: #fff; }
    .generated-empty { padding: 24px 16px; border-radius: 14px; text-align: center; background: linear-gradient(180deg, #f7fbff 0%, #edf4f9 100%); color: var(--text-soft); border: 1px dashed rgba(176,197,218,.8); }
    .capture-wrap { position: absolute; left: -10000px; top: 0; opacity: 1; pointer-events: none; }
    @media (max-width: 1240px) { .workspace { grid-template-columns: 1fr; } .editor-panel { position: static; } }
    @media (max-width: 860px) { .app { padding: 18px 12px 28px; } .preview-stage { min-height: 620px; } .preview-banner { transform: scale(0.62); margin: 0; } .grid-2 { grid-template-columns: 1fr; } .cta-btn { width: 100%; } }
  </style>
</head>
<body>
  <div class="app">
    <div class="hero">
      <h1>知识卡片生成器</h1>
      <p>按参考图风格生成 750 × 906 卡片，支持文本实时编辑、单图多图导出与 CTA 文案自定义。</p>
    </div>
    <div class="status-bar"><div class="status-chip">导出尺寸：750 × 906 PNG</div></div>
    <div class="workspace">
      <section class="preview-panel">
        <div class="preview-header">
          <div>
            <div class="preview-title">实时预览</div>
            <div class="preview-note">图片支持拖拽调整位置，缩放滑块调整大小。</div>
          </div>
        </div>
        <div class="preview-stage"><div id="banner-preview-2" class="banner preview-banner" aria-label="实时预览"></div></div>
      </section>
      <aside class="editor-panel">
        <div class="panel-title">在线编辑</div>
        <div class="panel-desc">页面视觉已调整为更接近你提供的参考图，底部动作按钮文案也已改成可配置字段。</div>
        <div class="section-card">
          <h3>图片模式</h3>
          <div class="mode-selector">
            <button id="btnSingleMode" class="mode-btn active" type="button">单图模式</button>
            <button id="btnMultiMode" class="mode-btn" type="button">多图模式</button>
          </div>
          <div class="btn-row">
            <input id="fileInput" type="file" accept="image/*" style="display:none" />
            <button id="btnPick" class="btn secondary" type="button">选择图片</button>
            <button id="btnResetImg" class="btn secondary" type="button" disabled>重置图片</button>
          </div>
          <div id="imgTools" class="slider-wrap" style="display:none">
            <div class="slider-row">
              <span class="field-label" style="margin:0">缩放</span>
              <input id="scaleRange" type="range" min="0.5" max="2.5" step="0.01" value="1" />
              <span id="scaleValue" class="kbd">1.00×</span>
            </div>
          </div>
          <div id="multiImagePreview" class="multi-image-preview" style="display:none"><div class="multi-image-empty">多图模式下可一次选择多张图片，并逐张调整。</div></div>
        </div>
        <div class="section-card">
          <h3>主文案</h3>
          <div class="grid-2">
            <label><span class="field-label">右上角标签</span><input id="tagHead2" class="input" type="text" value="冲刺倒计时" /></label>
            <label><span class="field-label">考试名称</span><input id="examTitle2" class="input" type="text" value="二建" /></label>
          </div>
          <div class="grid-2" style="margin-top:12px">
            <label><span class="field-label">专题名称</span><input id="topic2" class="input" type="text" value="法规" /></label>
            <label><span class="field-label">卡片标题</span><input id="cardTitle2" class="input" type="text" value="高频考点" /></label>
          </div>
          <div class="grid-2" style="margin-top:12px">
            <label><span class="field-label">中间图框标题</span><input id="frameTitle2" class="input" type="text" value="建设工程招投标流程关键节点图解" /></label>
            <label><span class="field-label">品牌副标题</span><input id="brandSub2" class="input" type="text" value="智能备考 · 二建专项" /></label>
          </div>
        </div>
        <div class="section-card">
          <h3>底部信息</h3>
          <div class="grid-2">
            <label><span class="field-label">卖点 1</span><input id="slogan1_2" class="input" type="text" value="每日解锁高频考点" /></label>
            <label><span class="field-label">卖点 2</span><input id="slogan2_2" class="input" type="text" value="考前冲刺抢分" /></label>
          </div>
          <div class="grid-2" style="margin-top:12px">
            <label><span class="field-label">卖点 3（可选）</span><input id="slogan3_2" class="input" type="text" value="" /></label>
            <label><span class="field-label">CTA 按钮文案</span><input id="ctaText2" class="input" type="text" value="免费解锁冲刺资料" /></label>
          </div>
        </div>
        <div class="section-card">
          <h3>主题色</h3>
          <label>
            <span class="field-label">选择主题</span>
            <select id="themeSelector" class="input">
              <option value="default">默认蓝白</option>
              <option value="blue">深海蓝</option>
              <option value="teal">青蓝玻璃</option>
              <option value="gold">金蓝质感</option>
              <option value="red">暖红冲刺</option>
            </select>
          </label>
        </div>
        <div class="action-row">
          <button id="btnGenerate" class="btn primary" type="button">生成图片</button>
          <button id="btnDownload" class="btn secondary" type="button" disabled>下载 PNG</button>
        </div>
        <div class="generated-box">
          <img id="generatedImg" alt="生成图片" style="display:none" />
          <div id="generatedEmpty" class="generated-empty">点击“生成图片”后，这里会显示导出的结果预览。</div>
        </div>
        <div class="small-note" style="margin-top:12px">CTA 按钮文案现在会实时同步到卡片底部，可直接改成“点击领取更多免费资料”等任意内容。</div>
      </aside>
    </div>
    <div class="capture-wrap"><div id="banner-capture" class="banner"></div></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>
    const FRAME_W = 684;
    const FRAME_H = 404;
    const $ = (id) => document.getElementById(id);

    let currentMode = "single";
    let multiImages = [];
    let currentMultiImageIndex = 0;

    const state = {
      tagHead: "冲刺倒计时",
      cardTitle: "高频考点",
      examTitle: "二建",
      topic: "法规",
      frameTitle: "建设工程招投标流程关键节点图解",
      brandSub: "智能备考 · 二建专项",
      slogans: ["每日解锁高频考点", "考前冲刺抢分", ""],
      ctaText: "免费解锁冲刺资料",
      imageDataUrl: null,
      imgNatural: { w: 1, h: 1 },
      baseFitScale: 1,
      userScale: 1,
      dx: 0,
      dy: 0
    };

    function getCurrentTextState() {
      return {
        tagHead: state.tagHead,
        cardTitle: state.cardTitle,
        examTitle: state.examTitle,
        topic: state.topic,
        frameTitle: state.frameTitle,
        brandSub: state.brandSub,
        slogans: [...state.slogans],
        ctaText: state.ctaText
      };
    }

    function applyTextState(textState) {
      if (!textState) return;
      state.tagHead = textState.tagHead ?? state.tagHead;
      state.cardTitle = textState.cardTitle ?? state.cardTitle;
      state.examTitle = textState.examTitle ?? state.examTitle;
      state.topic = textState.topic ?? state.topic;
      state.frameTitle = textState.frameTitle ?? state.frameTitle;
      state.brandSub = textState.brandSub ?? state.brandSub;
      state.slogans = Array.isArray(textState.slogans) ? [...textState.slogans] : state.slogans;
      state.ctaText = textState.ctaText ?? state.ctaText;
    }

    const themes = {
      default: {
        "--title-main": "#0b4f86",
        "--title-accent": "#1d6ca5",
        "--icon-accent": "#56a8dd",
        "--cta-bg": "linear-gradient(180deg, #14558d 0%, #0d4578 100%)",
        "--cta-arrow-bg": "linear-gradient(180deg, #d9e7f8 0%, #b7d0ee 100%)",
        "--badge-bg": "linear-gradient(180deg, #eff4f8 0%, #d8e4ee 100%)",
        "--slogan-bg": "linear-gradient(90deg, #edf3f8 0%, #dce7f2 50%, #eef3f8 100%)",
        "--footer-bg": "linear-gradient(180deg, #d7e3ef 0%, #cad8e8 100%)"
      },
      blue: {
        "--title-main": "#032d52",
        "--title-accent": "#0f5d9b",
        "--icon-accent": "#63b9f3",
        "--cta-bg": "linear-gradient(180deg, #0d3961 0%, #062746 100%)",
        "--cta-arrow-bg": "linear-gradient(180deg, #cfe5fb 0%, #a9caec 100%)",
        "--badge-bg": "linear-gradient(180deg, #e7eff8 0%, #d1dfef 100%)",
        "--slogan-bg": "linear-gradient(90deg, #e6f0f8 0%, #d5e3f3 50%, #e6eef7 100%)",
        "--footer-bg": "linear-gradient(180deg, #cfdeee 0%, #bdd2e5 100%)"
      },
      teal: {
        "--title-main": "#0e4f66",
        "--title-accent": "#1480a1",
        "--icon-accent": "#54c4cf",
        "--cta-bg": "linear-gradient(180deg, #0f6671 0%, #0a4a52 100%)",
        "--cta-arrow-bg": "linear-gradient(180deg, #daf7f7 0%, #b7e8ea 100%)",
        "--badge-bg": "linear-gradient(180deg, #eefaf9 0%, #d9efed 100%)",
        "--slogan-bg": "linear-gradient(90deg, #e6f6f7 0%, #d6edee 50%, #edf8f7 100%)",
        "--footer-bg": "linear-gradient(180deg, #d2e9eb 0%, #c0dde0 100%)"
      },
      gold: {
        "--title-main": "#22496d",
        "--title-accent": "#9f6c16",
        "--icon-accent": "#c89b3c",
        "--cta-bg": "linear-gradient(180deg, #936318 0%, #6f4710 100%)",
        "--cta-arrow-bg": "linear-gradient(180deg, #f9efd2 0%, #ecd69d 100%)",
        "--badge-bg": "linear-gradient(180deg, #f5f2e8 0%, #eadfca 100%)",
        "--slogan-bg": "linear-gradient(90deg, #f5f0e5 0%, #eee2cb 50%, #f6f2e8 100%)",
        "--footer-bg": "linear-gradient(180deg, #e8deca 0%, #dcccaf 100%)"
      },
      red: {
        "--title-main": "#7b2631",
        "--title-accent": "#aa3b4c",
        "--icon-accent": "#e77f85",
        "--cta-bg": "linear-gradient(180deg, #9c3142 0%, #792232 100%)",
        "--cta-arrow-bg": "linear-gradient(180deg, #f8dce0 0%, #efbcc6 100%)",
        "--badge-bg": "linear-gradient(180deg, #f7ecee 0%, #eedcdf 100%)",
        "--slogan-bg": "linear-gradient(90deg, #f7eef0 0%, #f0dfe3 50%, #f8eff1 100%)",
        "--footer-bg": "linear-gradient(180deg, #ebdbe0 0%, #dfc8cf 100%)"
      }
    };

    function createBannerInnerHTML() {
      return `
        <div class="banner-sheen"></div>
        <div class="content">
          <div class="countdown-badge">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 7V12L15 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="12" cy="13" r="8" stroke="currentColor" stroke-width="2"/>
              <path d="M9 2H15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M18.5 5.5L20 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span id="t_tagHead">冲刺倒计时</span>
          </div>
          <div class="title-block">
            <span id="t_examTitle" class="title-piece">二建</span>
            <span class="title-divider"></span>
            <span id="t_topic" class="title-piece accent">法规</span>
            <svg class="title-icon" viewBox="0 0 64 64" fill="none" aria-hidden="true">
              <path d="M10 22L32 14L54 22L32 30L10 22Z" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/>
              <path d="M18 26V42C18 45 25 49 32 49C39 49 46 45 46 42V26" stroke="currentColor" stroke-width="3"/>
              <path d="M32 14V42" stroke="currentColor" stroke-width="3"/>
            </svg>
            <span id="t_cardTitle" class="title-piece">高频考点</span>
          </div>
          <div class="frame-wrap">
            <div id="t_frameTitle" class="frame-tab">建设工程招投标流程关键节点图解</div>
            <div class="placeholder-box" id="imgFrame">
              <div class="ph-grid"></div>
              <div id="placeholderCopy" class="placeholder-copy">
                <div class="ph-icon">
                  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <rect x="3" y="4" width="18" height="16" rx="3" stroke="currentColor" stroke-width="1.8"/>
                    <path d="M7 15L10.5 11.5L13.5 14.5L17 11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="9" cy="9" r="1.5" fill="currentColor"/>
                  </svg>
                </div>
                <div class="ph-main">在此放置参考图中的流程图或知识信息图</div>
                <div class="ph-sub">支持拖拽定位与缩放，导出时会按 750 × 906 比例生成。</div>
              </div>
              <div class="uploaded-layer" id="uploadedLayer" style="display:none">
                <img id="uploadedImg" alt="上传图片" src="" />
              </div>
            </div>
          </div>
          <div class="slogan-bar" id="t_sloganRow">
            <div id="t_slogan1" class="slogan-item">每日解锁高频考点</div>
            <div id="t_sloganSep1" class="slogan-sep"></div>
            <div id="t_slogan2" class="slogan-item">考前冲刺抢分</div>
            <div id="t_sloganSep2" class="slogan-sep" style="display:none"></div>
            <div id="t_slogan3" class="slogan-item" style="display:none"></div>
          </div>
          <div class="footer-row">
            <div class="cta-btn">
              <span id="t_ctaText" class="cta-text">免费解锁冲刺资料</span>
              <div class="cta-arrow">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M5 12H19M13 6L19 12L13 18" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
            </div>
          </div>
        </div>
        `;
    }

    function getNodes(root) {
      return {
        tagHead: root.querySelector("#t_tagHead"),
        examTitle: root.querySelector("#t_examTitle"),
        topic: root.querySelector("#t_topic"),
        cardTitle: root.querySelector("#t_cardTitle"),
        frameTitle: root.querySelector("#t_frameTitle"),
        ctaText: root.querySelector("#t_ctaText"),
        slogan1: root.querySelector("#t_slogan1"),
        slogan2: root.querySelector("#t_slogan2"),
        slogan3: root.querySelector("#t_slogan3"),
        sloganSep1: root.querySelector("#t_sloganSep1"),
        sloganSep2: root.querySelector("#t_sloganSep2"),
        uploadedLayer: root.querySelector("#uploadedLayer"),
        uploadedImg: root.querySelector("#uploadedImg"),
        placeholderCopy: root.querySelector("#placeholderCopy"),
        imgFrame: root.querySelector("#imgFrame")
      };
    }

    const nodesPreview2 = { current: null };
    const nodesCapture = { current: null };
    let dirty = true;

    function mountTemplate() {
      const preview = $("banner-preview-2");
      const capture = $("banner-capture");
      preview.innerHTML = createBannerInnerHTML();
      capture.innerHTML = createBannerInnerHTML();
      bindImageDrag(preview);
    }

    function renderAll() {
      const previewRoot = $("banner-preview-2");
      const captureRoot = $("banner-capture");
      nodesPreview2.current = nodesPreview2.current || getNodes(previewRoot);
      nodesCapture.current = nodesCapture.current || getNodes(captureRoot);
      const roots = [nodesPreview2.current, nodesCapture.current];

      roots.forEach((n) => {
        n.tagHead.textContent = state.tagHead || "";
        n.examTitle.textContent = state.examTitle || "";
        n.topic.textContent = state.topic || "";
        n.cardTitle.textContent = state.cardTitle || "";
        n.frameTitle.textContent = state.frameTitle || "";
        n.ctaText.textContent = state.ctaText || "";
      });

      const s1 = (state.slogans[0] || "").trim();
      const s2 = (state.slogans[1] || "").trim();
      const s3 = (state.slogans[2] || "").trim();
      roots.forEach((n) => {
        n.slogan1.textContent = s1;
        n.slogan2.textContent = s2;
        n.slogan3.textContent = s3;
        n.slogan1.style.display = s1 ? "block" : "none";
        n.slogan2.style.display = s2 ? "block" : "none";
        n.slogan3.style.display = s3 ? "block" : "none";
        n.sloganSep1.style.display = s1 && s2 ? "block" : "none";
        n.sloganSep2.style.display = s2 && s3 ? "block" : "none";
      });

      const hasImg = !!state.imageDataUrl;
      roots.forEach((n) => {
        n.placeholderCopy.style.display = hasImg ? "none" : "block";
        n.uploadedLayer.style.display = hasImg ? "block" : "none";
        if (hasImg) n.uploadedImg.src = state.imageDataUrl;
      });

      updateImageTransform(nodesPreview2.current);
      updateImageTransform(nodesCapture.current);
    }

    function updateImageTransform(n) {
      if (!state.imageDataUrl || !n) return;
      const scale = state.baseFitScale * state.userScale;
      n.uploadedImg.style.setProperty("--scale", scale);
      n.uploadedImg.style.setProperty("--dx", `${state.dx}px`);
      n.uploadedImg.style.setProperty("--dy", `${state.dy}px`);
    }

    function bindImageDrag(previewRoot) {
      const np = getNodes(previewRoot);
      const frame = np.imgFrame;
      const layer = np.uploadedLayer;
      let dragging = false;
      let startX = 0;
      let startY = 0;
      let startDx = 0;
      let startDy = 0;

      function onPointerDown(e) {
        if (!state.imageDataUrl) return;
        if (e.target !== layer && !layer.contains(e.target)) return;
        dragging = true;
        frame.setPointerCapture?.(e.pointerId);
        startX = e.clientX;
        startY = e.clientY;
        startDx = state.dx;
        startDy = state.dy;
      }

      function onPointerMove(e) {
        if (!dragging) return;
        state.dx = startDx + (e.clientX - startX);
        state.dy = startDy + (e.clientY - startY);
        updateImageTransform(np);
        if (nodesCapture.current) updateImageTransform(nodesCapture.current);
        saveCurrentMultiImageState();
        dirty = true;
      }

      function onPointerUp() { dragging = false; }
      layer.addEventListener("pointerdown", onPointerDown);
      window.addEventListener("pointermove", onPointerMove);
      window.addEventListener("pointerup", onPointerUp);
    }

    function applyTheme(themeName) {
      const theme = themes[themeName] || themes.default;
      Object.entries(theme).forEach(([key, value]) => {
        document.documentElement.style.setProperty(key, value);
      });
      dirty = true;
      renderAll();
    }

    function readFileAsDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = reject;
        reader.onload = () => resolve(reader.result);
        reader.readAsDataURL(file);
      });
    }

    async function onPickFile(file) {
      const dataUrl = await readFileAsDataURL(file);
      const img = new Image();
      img.decoding = "async";
      img.src = dataUrl;
      await img.decode();
      state.imageDataUrl = dataUrl;
      state.imgNatural = { w: img.naturalWidth || img.width, h: img.naturalHeight || img.height };
      state.baseFitScale = Math.max(FRAME_W / state.imgNatural.w, FRAME_H / state.imgNatural.h);
      state.userScale = 1;
      state.dx = 0;
      state.dy = 0;
      $("imgTools").style.display = "block";
      $("scaleRange").value = "1";
      $("scaleValue").textContent = "1.00×";
      $("btnResetImg").disabled = false;
      dirty = true;
      renderAll();
    }

    async function onPickMultiFiles(files) {
      for (const file of files) {
        if (!file.type.startsWith("image/")) continue;
        const dataUrl = await readFileAsDataURL(file);
        const img = new Image();
        img.decoding = "async";
        img.src = dataUrl;
        await img.decode();
        multiImages.push({
          dataUrl,
          imgNatural: { w: img.naturalWidth || img.width, h: img.naturalHeight || img.height },
          baseFitScale: Math.max(FRAME_W / (img.naturalWidth || img.width), FRAME_H / (img.naturalHeight || img.height)),
          textState: getCurrentTextState(),
          userScale: 1,
          dx: 0,
          dy: 0
        });
      }
      if (multiImages.length) {
        currentMultiImageIndex = 0;
        setCurrentMultiImage(0);
        $("btnResetImg").disabled = false;
      }
      renderMultiImagePreview();
    }

    function setCurrentMultiImage(index) {
      if (index < 0 || index >= multiImages.length) return;
      currentMultiImageIndex = index;
      const imgData = multiImages[index];
      state.imageDataUrl = imgData.dataUrl;
      state.imgNatural = imgData.imgNatural;
      state.baseFitScale = imgData.baseFitScale;
      applyTextState(imgData.textState);
      state.userScale = imgData.userScale;
      state.dx = imgData.dx;
      state.dy = imgData.dy;
      $("imgTools").style.display = "block";
      $("scaleRange").value = String(state.userScale);
      $("scaleValue").textContent = `${state.userScale.toFixed(2)}×`;
      dirty = true;
      syncInputsFromState();
      renderAll();
      renderMultiImagePreview();
    }

    function saveCurrentMultiImageState() {
      if (currentMode !== "multi" || !multiImages.length) return;
      multiImages[currentMultiImageIndex].textState = getCurrentTextState();
      multiImages[currentMultiImageIndex].userScale = state.userScale;
      multiImages[currentMultiImageIndex].dx = state.dx;
      multiImages[currentMultiImageIndex].dy = state.dy;
    }

    function removeMultiImage(index) {
      multiImages.splice(index, 1);
      if (multiImages.length) {
        currentMultiImageIndex = Math.min(index, multiImages.length - 1);
        setCurrentMultiImage(currentMultiImageIndex);
      } else {
        state.imageDataUrl = null;
        $("imgTools").style.display = "none";
        $("btnResetImg").disabled = true;
        currentMultiImageIndex = 0;
        renderAll();
      }
      renderMultiImagePreview();
    }

    function renderMultiImagePreview() {
      const container = $("multiImagePreview");
      if (!multiImages.length) {
        container.innerHTML = '<div class="multi-image-empty">多图模式下可一次选择多张图片，并逐张调整。</div>';
        return;
      }
      container.innerHTML = multiImages.map((imgData, index) => `
        <div class="multi-image-item ${index === currentMultiImageIndex ? "selected" : ""}" onclick="setCurrentMultiImage(${index})">
          <img src="${imgData.dataUrl}" alt="预览图 ${index + 1}" />
          <button class="multi-image-remove" type="button" onclick="event.stopPropagation(); removeMultiImage(${index})">×</button>
        </div>
      `).join("");
    }

    function syncInputsFromState() {
      $("tagHead2").value = state.tagHead;
      $("cardTitle2").value = state.cardTitle;
      $("examTitle2").value = state.examTitle;
      $("topic2").value = state.topic;
      $("frameTitle2").value = state.frameTitle;
      $("brandSub2").value = state.brandSub;
      $("slogan1_2").value = state.slogans[0] || "";
      $("slogan2_2").value = state.slogans[1] || "";
      $("slogan3_2").value = state.slogans[2] || "";
      $("ctaText2").value = state.ctaText;
    }

    function syncInputsToState() {
      state.tagHead = $("tagHead2").value;
      state.cardTitle = $("cardTitle2").value;
      state.examTitle = $("examTitle2").value;
      state.topic = $("topic2").value;
      state.frameTitle = $("frameTitle2").value;
      state.brandSub = $("brandSub2").value;
      state.slogans = [$("slogan1_2").value, $("slogan2_2").value, $("slogan3_2").value];
      state.ctaText = $("ctaText2").value;
      saveCurrentMultiImageState();
      dirty = true;
      renderAll();
    }

    async function exportPNG() {
      const canvas = await html2canvas($("banner-capture"), {
        backgroundColor: "#ffffff",
        scale: 1,
        useCORS: false,
        allowTaint: true,
        logging: false,
        removeContainer: false,
        width: 750,
        height: 906
      });
      return new Promise((resolve) => {
        canvas.toBlob((blob) => resolve({ blob, canvas }));
      });
    }

    function showGeneratedFromBlob(blob) {
      const url = URL.createObjectURL(blob);
      $("generatedImg").src = url;
      $("generatedImg").style.display = "block";
      $("generatedEmpty").style.display = "none";
      $("btnDownload").disabled = false;
      $("btnDownload").dataset.url = url;
      dirty = false;
    }

    function switchMode(mode) {
      currentMode = mode;
      $("btnSingleMode").classList.toggle("active", mode === "single");
      $("btnMultiMode").classList.toggle("active", mode === "multi");
      $("multiImagePreview").style.display = mode === "multi" ? "grid" : "none";
      const fileInput = $("fileInput");
      if (mode === "multi") fileInput.setAttribute("multiple", "multiple");
      else fileInput.removeAttribute("multiple");
      if (mode === "single" && multiImages.length) setCurrentMultiImage(0);
      else if (mode === "multi") renderMultiImagePreview();
    }

    function bindUI() {
      mountTemplate();
      renderAll();
      syncInputsFromState();
      applyTheme("default");

      $("themeSelector").addEventListener("change", (e) => applyTheme(e.target.value));
      $("btnPick").addEventListener("click", () => $("fileInput").click());
      $("fileInput").addEventListener("change", async (e) => {
        const files = e.target.files;
        if (!files || !files.length) return;
        if (currentMode === "multi") await onPickMultiFiles(files);
        else {
          const file = files[0];
          if (!file.type.startsWith("image/")) {
            alert("请选择图片文件");
            return;
          }
          await onPickFile(file);
        }
        e.target.value = "";
      });

      $("scaleRange").addEventListener("input", () => {
        state.userScale = parseFloat($("scaleRange").value);
        $("scaleValue").textContent = `${state.userScale.toFixed(2)}×`;
        updateImageTransform(getNodes($("banner-preview-2")));
        if (nodesCapture.current) updateImageTransform(nodesCapture.current);
        saveCurrentMultiImageState();
        dirty = true;
      });

      $("btnResetImg").addEventListener("click", () => {
        state.userScale = 1;
        state.dx = 0;
        state.dy = 0;
        $("scaleRange").value = "1";
        $("scaleValue").textContent = "1.00×";
        saveCurrentMultiImageState();
        dirty = true;
        renderAll();
      });

      ["tagHead2", "cardTitle2", "examTitle2", "topic2", "frameTitle2", "brandSub2", "slogan1_2", "slogan2_2", "slogan3_2", "ctaText2"].forEach((id) => {
        $(id).addEventListener("input", syncInputsToState);
      });

      $("btnSingleMode").addEventListener("click", () => switchMode("single"));
      $("btnMultiMode").addEventListener("click", () => switchMode("multi"));

      $("btnGenerate").addEventListener("click", async () => {
        $("btnGenerate").disabled = true;
        $("btnDownload").disabled = true;
        try {
          if (currentMode === "multi" && multiImages.length > 1) {
            for (let i = 0; i < multiImages.length; i += 1) {
              setCurrentMultiImage(i);
              const { blob } = await exportPNG();
              const url = URL.createObjectURL(blob);
              const a = document.createElement("a");
              a.href = url;
              a.download = `knowledge-card-750x906-${i + 1}.png`;
              document.body.appendChild(a);
              a.click();
              a.remove();
              URL.revokeObjectURL(url);
            }
            setCurrentMultiImage(0);
            alert(`已成功生成并下载 ${multiImages.length} 张图片！`);
          } else {
            const { blob } = await exportPNG();
            showGeneratedFromBlob(blob);
          }
        } catch (err) {
          console.error(err);
          alert(`生成失败：${err?.message || "请稍后重试"}`);
        } finally {
          $("btnGenerate").disabled = false;
        }
      });

      $("btnDownload").addEventListener("click", async () => {
        try {
          $("btnDownload").disabled = true;
          if (dirty || !$("btnDownload").dataset.url) {
            const { blob } = await exportPNG();
            showGeneratedFromBlob(blob);
          }
          const url = $("btnDownload").dataset.url;
          if (!url) return;
          const a = document.createElement("a");
          a.href = url;
          a.download = "knowledge-card-750x906.png";
          document.body.appendChild(a);
          a.click();
          a.remove();
        } finally {
          $("btnDownload").disabled = false;
        }
      });
    }

    window.setCurrentMultiImage = setCurrentMultiImage;
    window.removeMultiImage = removeMultiImage;
    bindUI();
  </script>
</body>
</html>
