<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>知识卡片生成器（750×906）</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --banner-top-strip: linear-gradient(90deg, #1B4F8A 0%, #2E7AD4 50%, #F07D1A 100%);
      --banner-bg: #FFFFFF;
      --banner-header-bg: #F6F9FC;
      --banner-slogan-bg: #E8F1FA;
      --banner-slogan-text: #1B4F8A;
      --banner-btn-bg: #1B4F8A;
      --banner-btn-text: #FFFFFF;
      --banner-tag-bg: #1B4F8A;
      --banner-tag-text: #FFFFFF;
      --banner-exam-text: #F07D1A;
      --banner-title-text: #1B4F8A;
      --banner-zone-text: #64748B;
      --banner-footer-text: #94A3B8;
    }
    body {
      background: #E8ECF2;
      color: #0D2B54;
      font-family: -apple-system, "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
    }

    .app {
      padding: 16px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .tabs {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .tab-btn {
      border: 1px solid #C9D9EA;
      background: rgba(255,255,255,0.7);
      color: #1B4F8A;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      user-select: none;
      font-weight: 600;
    }
    .tab-btn.active {
      background: #1B4F8A;
      border-color: #1B4F8A;
      color: #FFFFFF;
    }

    .panel {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    .left {
      width: 420px;
      flex: 0 0 420px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .right {
      flex: 1;
      background: rgba(255,255,255,0.7);
      border: 1px solid #C9D9EA;
      border-radius: 14px;
      padding: 14px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 800;
      color: #35587C;
      margin-bottom: 8px;
      letter-spacing: .5px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }

    label { display: block; }
    .field-label {
      font-size: 12px;
      color: #5A7299;
      margin-bottom: 6px;
      font-weight: 700;
      letter-spacing: .3px;
    }
    .input, .textarea {
      width: 100%;
      border-radius: 12px;
      border: 1px solid #C9D9EA;
      padding: 10px 12px;
      outline: none;
      font-size: 14px;
      background: #FFFFFF;
      color: #0D2B54;
    }
    .textarea { min-height: 84px; resize: vertical; }

    .hint {
      margin-top: 6px;
      font-size: 12px;
      color: #8AA0B9;
      line-height: 1.5;
    }

    .pill-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      cursor: pointer;
      padding: 10px 14px;
      border-radius: 12px;
      background: #1B4F8A;
      color: #fff;
      font-weight: 800;
      letter-spacing: .3px;
    }
    .btn.secondary {
      background: #FFFFFF;
      color: #1B4F8A;
      border: 1px solid #C9D9EA;
    }
    .btn:disabled {
      opacity: .55;
      cursor: not-allowed;
    }

    .preview-stage {
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 8px 0;
    }

    /* ===== Banner Template ===== */
    .banner {
      width: 750px;
      height: 906px;
      background: var(--banner-bg);
      position: relative;
      overflow: hidden;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.15);
    }
    .top-strip {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 12px;
      background: var(--banner-top-strip);
    }
    .bg-deco {
      position: absolute;
      top: 0; right: 0;
      width: 300px; height: 300px;
      background: radial-gradient(circle at 75% 25%, rgba(27,79,138,0.055) 0%, transparent 60%);
      pointer-events: none;
    }
    .bg-deco2 {
      position: absolute;
      bottom: 60px; left: 0;
      width: 220px; height: 180px;
      background: radial-gradient(circle at 15% 85%, rgba(240,125,26,0.05) 0%, transparent 60%);
      pointer-events: none;
    }
    .corner-geo {
      position: absolute;
      top: 6px; right: 0;
      width: 110px; height: 110px;
      overflow: hidden;
      pointer-events: none;
    }
    .corner-geo::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 0; height: 0;
      border-style: solid;
      border-width: 0 110px 110px 0;
      border-color: transparent #EDF3FB transparent transparent;
    }
    .corner-geo::after {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 0; height: 0;
      border-style: solid;
      border-width: 0 52px 52px 0;
      border-color: transparent rgba(240,125,26,0.18) transparent transparent;
    }

    .content {
      position: relative;
      z-index: 5;
      padding: 0 44px;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* 标签行 */
    .tag-row {
      padding-top: 28px;
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
    }
    .tag-pill-solid {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: #1B4F8A;
      border-radius: 100px;
      padding: 9px 22px;
    }
    .tag-pill-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #F07D1A;
      flex-shrink: 0;
    }
    .tag-pill-solid-text {
      font-size: 21px;
      font-weight: 600;
      color: #FFFFFF;
      letter-spacing: 1.5px;
      white-space: nowrap;
    }

    /* 主标题 */
    .main-title {
      font-size: 54px;
      font-weight: 800;
      color: #0D2B54;
      letter-spacing: 3px;
      line-height: 1.2;
      margin-bottom: 14px;
      word-break: break-word;
    }
    .main-title .exam { color: #0D2B54; }
    .main-title .hl { color: #F07D1A; }

    /* slogan 三点（2-3个） */
    .slogan {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .slogan-item {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 21px;
      color: #5A7299;
      letter-spacing: 1px;
      padding: 0 18px;
      white-space: nowrap;
    }
    .slogan-item:first-child { padding-left: 0; }
    .slogan-sep {
      width: 1px;
      height: 18px;
      background: #D4DEE9;
      flex-shrink: 0;
    }

    /* 信息图标签行 */
    .zone-label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      gap: 10px;
    }
    .zone-label {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .zone-label-bar {
      width: 4px;
      height: 20px;
      border-radius: 2px;
      background: #1B4F8A;
      flex-shrink: 0;
    }
    .zone-label-text {
      font-size: 20px;
      font-weight: 600;
      color: #1B4F8A;
      letter-spacing: 1px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 420px;
    }
    .zone-point-text {
      font-size: 20px;
      font-weight: 600;
      color: #1B4F8A;
      letter-spacing: 1px;
      white-space: nowrap;
    }
    .zone-sub {
      font-size: 16px;
      color: #A8BDD0;
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }

    /* 占位框：用于上传横幅图片（用户可缩放/拖拽调整） */
    .placeholder-box {
      width: 662px;
      height: 398px;
      border-radius: 14px;
      background: #F6F9FC;
      border: 2px dashed #BFD0E3;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 22px;
      flex-shrink: 0;
    }
    .ph-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(27,79,138,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(27,79,138,0.035) 1px, transparent 1px);
      background-size: 38px 38px;
      pointer-events: none;
    }
    .ph-icon {
      position: relative;
      z-index: 1;
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: #E8F1FA;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ph-main {
      font-size: 23px;
      font-weight: 600;
      color: #7A9CC4;
      letter-spacing: 2px;
      position: relative;
      z-index: 1;
    }
    .ph-size {
      position: absolute;
      bottom: 14px;
      right: 14px;
      background: #E2EDF7;
      border-radius: 7px;
      padding: 5px 12px;
      font-size: 16px;
      color: #5A80A0;
      letter-spacing: 0.5px;
      z-index: 1;
      pointer-events: none;
    }

    .uploaded-layer {
      position: absolute;
      inset: 0;
      z-index: 1; /* 盖在网格和虚线之上 */
      cursor: grab;
      user-select: none;
    }
    .uploaded-layer:active { cursor: grabbing; }
    .uploaded-layer img {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) translate(var(--dx, 0px), var(--dy, 0px)) scale(var(--scale, 1));
      transform-origin: center center;
      will-change: transform;
      max-width: none;
      max-height: none;
      pointer-events: none; /* 让拖拽由外层处理 */
    }

    /* 底部CTA行 */
    .footer-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 0;
    }
    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      background: #1B4F8A;
      border-radius: 100px;
      padding: 22px 44px 22px 52px;
      user-select: none;
    }
    .cta-text {
      font-size: 26px;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: 3px;
      white-space: nowrap;
    }
    .cta-arrow {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #F07D1A;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .cta-arrow svg { width: 16px; height: 16px; }

    /* 品牌底栏 */
    .brand-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 50px;
      background: #F2F6FB;
      border-top: 1px solid #E0EAF3;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }
    .brand-inner { display: flex; align-items: center; gap: 10px; }
    .brand-icon {
      width: 22px; height: 22px;
      border-radius: 6px;
      background: #1B4F8A;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .brand-name {
      font-size: 19px;
      font-weight: 600;
      color: #35587C;
      letter-spacing: 2px;
    }
    .brand-divider { width: 1px; height: 16px; background: #C0D2E2; }
    .brand-sub { font-size: 17px; color: #9AB0C5; letter-spacing: 1px; }

    /* Layout for two pages */
    .page { display: none; }
    .page.active { display: block; }

    /* Preview scaling (left side) */
    .scaled-preview {
      transform: scale(0.5);
      transform-origin: top left;
      width: 750px;
      height: 906px;
    }
    .preview-wrap {
      display: inline-block;
      position: relative;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.15);
      overflow: hidden;
    }

    .capture-wrap {
      position: absolute;
      left: -10000px;
      top: 0;
      pointer-events: none;
      opacity: 1;
    }

    .row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .slider-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    input[type="range"] { width: 240px; }

    .generated {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }
    .generated-left {
      width: 420px;
      flex: 0 0 420px;
    }
    .generated-right {
      flex: 1;
      padding: 0 0 0 0;
    }

    .generated-img {
      width: 100%;
      background: #FFFFFF;
      border: 1px solid #C9D9EA;
      border-radius: 14px;
      padding: 10px;
    }
    .generated-img img {
      width: 100%;
      height: auto;
      display: block;
    }
    .small-note {
      font-size: 12px;
      color: #8AA0B9;
      margin-top: 8px;
      line-height: 1.5;
    }

    .kbd {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      border: 1px solid #C9D9EA;
      padding: 2px 6px;
      border-radius: 8px;
      background: #fff;
      color: #1B4F8A;
      font-weight: 700;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="pill-row">
        <div class="small-note" style="margin:0">
          导出尺寸：<span class="kbd">750 × 906</span>（PNG）
        </div>
      </div>
    </div>

    <!-- ===== Page 2 ===== -->
    <div id="page2" class="page active">
      <div style="text-align:center;margin-bottom:20px;padding:20px 0">
        <h1 style="font-size:28px;font-weight:800;color:#1B4F8A;margin-bottom:8px">知识卡片生成器</h1>
        <p style="font-size:16px;color:#5A7299">创建专业的知识卡片，支持自定义文本和图片</p>
      </div>
      
      <div style="display:flex;flex-direction:row;gap:20px;max-width:1400px;margin:0 auto;padding:0 20px;flex-wrap:wrap">
        <!-- 左侧：预览和操作区域 -->
        <div style="flex:1;min-width:700px">
            <div style="width: 600px; height: 724.8px; margin: 20px auto; position: relative;">
                <div id="banner-preview-2" class="banner" aria-label="实时预览" style="transform:scale(0.8);transform-origin:top left;position:absolute;top:0;left:0;"></div>
              </div>
          

          
          <div id="imgTools" class="row" style="display:none;justify-content:center;margin:15px 0">
            <div class="slider-row">
              <span class="field-label" style="margin:0">缩放</span>
              <input id="scaleRange" type="range" min="0.5" max="2.5" step="0.01" value="1"/>
              <span id="scaleValue" class="kbd">1.00×</span>
            </div>
          </div>
          
          <div class="generated-img" style="margin:20px 0">
            <img id="generatedImg" alt="生成图片" style="display:none"/>
            <div id="generatedEmpty" style="padding:24px;color:#8AA0B9;text-align:center;background:#F6F9FC;border-radius:12px">
              点击“生成图片”按钮生成图片
            </div>
          </div>
          
          <div class="small-note" style="text-align:center;margin-top:10px">
            <strong>小提示：</strong>点击图片区域可拖拽调整位置，使用缩放滑块调整大小。
          </div>
        </div>
        
        <!-- 右侧：编辑区域 -->
        <div style="flex:1;min-width:400px">
          <div class="right" style="width:100%;background:rgba(255,255,255,0.9);border-radius:16px;padding:24px;box-shadow:0 4px 20px rgba(0,0,0,0.08)">
            <div class="section-title" style="font-size:18px;margin-bottom:16px">在线编辑文本</div>
            <div class="grid-2">
              <div>
                <div class="field-label">1. 图头标签</div>
                <input id="tagHead2" class="input" type="text" value="备考加油站"/>
              </div>
              <div>
                <div class="field-label">2. 卡片标题</div>
                <input id="cardTitle2" class="input" type="text" value="高频考点知识图解"/>
              </div>
            </div>

            <div class="grid-2" style="margin-top:16px">
              <div>
                <div class="field-label">3. 考试</div>
                <input id="examTitle2" class="input" type="text" value="二建"/>
              </div>
              <div>
                <div class="field-label">4-1. 标签噱头（第1个）</div>
                <input id="slogan1_2" class="input" type="text" value="两分钟·看懂一个知识点"/>
              </div>
            </div>
            <div class="grid-2" style="margin-top:16px">
              <div>
                <div class="field-label">4-2. 标签噱头（第2个）</div>
                <input id="slogan2_2" class="input" type="text" value="考前冲刺抢分"/>
              </div>
              <div>
                <div class="field-label">4-3. 标签噱头（可选第3个）</div>
                <input id="slogan3_2" class="input" type="text"/>
              </div>
            </div>

            <div class="grid-2" style="margin-top:16px">
              <div>
                <div class="field-label">5. 考试专题</div>
                <input id="topic2" class="input" type="text" value="法规专题"/>
              </div>
              <div>
                <div class="field-label">7. 考点（选填）</div>
                <input id="point2" class="input" type="text" placeholder="例如：某某考点/某章"/>
              </div>
            </div>
            
            <div class="small-note" style="margin-top:20px;padding:12px;background:#E8F1FA;border-radius:8px">
              你修改的文本会立即同步到预览；点击“生成图片/下载PNG”即可导出。
            </div>
            
            <div style="display:flex;justify-content:flex-start;gap:12px;margin:20px 0 0 0;flex-wrap:wrap;border-top:1px dashed #C9D9EA;padding-top:20px;">
                <input id="fileInput" type="file" accept="image/*" style="display:none"/>
                <button id="btnPick" class="btn secondary" type="button">选择图片</button>
                <button id="btnResetImg" class="btn secondary" type="button" disabled>重置图片</button>
              </div>
              
              <div style="display:flex;justify-content:space-between;gap:12px;margin-top:20px;flex-wrap:wrap;border-top:1px dashed #C9D9EA;padding-top:20px;align-items:center;">
                <div style="display:flex;align-items:center;gap:8px">
                  <span style="font-weight:600;color:#1B4F8A">主题：</span>
                  <select id="themeSelector" class="input" style="padding:8px 12px;border-radius:8px;border:1px solid #D7E1EB;background:#FFFFFF;width:auto;">
                    <option value="default">默认主题</option>
                    <option value="blue">蓝色主题</option>
                    <option value="purple">紫色主题</option>
                    <option value="red">红色主题</option>
                    <option value="pink">粉色主题</option>
                  </select>
                </div>
                <div style="display:flex;gap:12px;">
                  <button id="btnGenerate" class="btn" type="button">生成图片</button>
                  <button id="btnDownload" class="btn secondary" type="button" disabled>下载PNG</button>
                </div>
              </div>
  
            </div> </div> </div> ```

    <!-- ===== Capture DOM (hidden, 1:1 750×906) ===== -->
    <div class="capture-wrap">
        <div id="banner-capture" class="banner" style="box-shadow: none; border-radius: 0;"></div>
    </div>
  </div>

  <!-- html2canvas -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>
    const FRAME_W = 662; // 知识信息图框宽
    const FRAME_H = 398; // 知识信息图框高

    const $ = (id) => document.getElementById(id);

    const state = {
      tagHead: "考前冲刺充电站",
      cardTitle: "高频考点图解",
      examTitle: "二建",
      slogans: [ "2分钟看懂一个知识点"],
      topic: "法规专题",
      point: "",
      imageDataUrl: null,
      imgNatural: { w: 1, h: 1 },
      baseFitScale: 1,
      userScale: 1,
      dx: 0,
      dy: 0
    };

    function createBannerInnerHTML() {
      // 注意：preview/capture 两个DOM只差别是是否在屏幕上缩放；内部结构一致，便于同步渲染与导出
      return `
        <div class="top-strip" style="background:var(--banner-top-strip)"></div>
        <div class="bg-deco"></div>
        <div class="bg-deco2"></div>
        <div class="corner-geo"></div>

        <div class="content">
          <div class="tag-row">
            <div class="tag-pill-solid" style="background:var(--banner-tag-bg)">
              <div class="tag-pill-dot" style="background:var(--banner-tag-text)"></div>
              <span id="t_tagHead" class="tag-pill-solid-text" style="color:var(--banner-tag-text)">冲刺倒计时</span>
            </div>
          </div>

          <div id="t_mainTitle" class="main-title">
            <span id="t_examTitle" class="exam" style="color:var(--banner-exam-text)">二建</span>
            <span class="hl" id="t_cardTitle" style="color:var(--banner-title-text)">高频考点</span>
          </div>

          <div class="slogan" id="t_sloganRow" style="background:var(--banner-slogan-bg)">
            <div id="t_slogan1" class="slogan-item" style="color:var(--banner-slogan-text)">每日解锁高频考点</div>
            <div class="slogan-sep" id="t_sloganSep1"></div>
            <div id="t_slogan2" class="slogan-item" style="color:var(--banner-slogan-text)">考前冲刺抢分</div>

            <div id="t_slogan3" class="slogan-item" style="display:none;color:var(--banner-slogan-text)">第三条噱头</div>

          <div class="zone-label-row">
            <div class="zone-label">
              <div class="zone-label-bar" style="background:var(--banner-slogan-text)"></div>

              <div id="t_zonePoint" class="zone-point-text" style="display:none;color:var(--banner-zone-text)">·考点</div>
            </div>
            <div class="zone-sub"></div>
          </div>

          <div class="placeholder-box" id="imgFrame">
            <div class="ph-grid"></div>
            <div class="ph-icon">
              <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                <rect x="3" y="3" width="22" height="22" rx="3.5" stroke="var(--banner-slogan-text)" stroke-width="1.4"/>
                <line x1="3" y1="10" x2="25" y2="10" stroke="var(--banner-slogan-text)" stroke-width="1.4"/>
                <line x1="14" y1="10" x2="14" y2="25" stroke="var(--banner-slogan-text)" stroke-width="1.4"/>
                <line x1="7" y1="14.5" x2="11" y2="14.5" stroke="var(--banner-slogan-text)" stroke-width="1.4" stroke-linecap="round"/>
                <line x1="7" y1="18.5" x2="11" y2="18.5" stroke="var(--banner-slogan-text)" stroke-width="1.4" stroke-linecap="round"/>
                <line x1="17" y1="14.5" x2="22" y2="14.5" stroke="var(--banner-slogan-text)" stroke-width="1.4" stroke-linecap="round"/>
                <line x1="17" y1="18.5" x2="21" y2="18.5" stroke="var(--banner-slogan-text)" stroke-width="1.4" stroke-linecap="round"/>
              </svg>
            </div>
            <div id="phMain" class="ph-main" style="color:var(--banner-slogan-text)">在此放置知识信息图</div>
            <div class="ph-size" style="color:var(--banner-slogan-text)">670 × 398 px · 横版</div>

            <div class="uploaded-layer" id="uploadedLayer" style="display:none">
              <img id="uploadedImg" alt="上传图片" src=""/>
            </div>
          </div>

          <div class="footer-row" style="display:flex;justify-content:center;margin-top:4px">
            <div class="cta-btn" style="background:var(--banner-btn-bg)">
              <span class="cta-text" style="color:var(--banner-btn-text)">免费解锁冲刺资料</span>
              <div class="cta-arrow">
                <svg viewBox="0 0 16 16" fill="none">
                  <path d="M3 8H13M9 4L13 8L9 12" stroke="var(--banner-btn-text)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
            </div>
          </div>
        </div>

        <div class="brand-bar" style="color:var(--banner-footer-text)">
          <div class="brand-inner">
            <div class="brand-icon"></div>
            <span class="brand-name">环球网校</span>
          </div>
          <div class="brand-divider"></div>
          <span class="brand-sub">智能备考 · 二建专项</span>
        </div>
      `;
    }

    function mountTemplate() {
      const preview2 = $("banner-preview-2");
      const capture = $("banner-capture");
      preview2.innerHTML = createBannerInnerHTML();
      capture.innerHTML = createBannerInnerHTML();

      // 绑定拖拽到页面2的预览
      bindImageDrag(preview2);
    }

    function getNodes(root) {
      return {
        tagHead: root.querySelector("#t_tagHead"),
        examTitle: root.querySelector("#t_examTitle"),
        cardTitle: root.querySelector("#t_cardTitle"),
        slogan1: root.querySelector("#t_slogan1"),
        slogan2: root.querySelector("#t_slogan2"),
        slogan3: root.querySelector("#t_slogan3"),
        sloganSep1: root.querySelector("#t_sloganSep1"),
        sloganSep2: root.querySelector("#t_sloganSep2"),
        zoneLabel: root.querySelector("#t_zoneLabel"),
        zonePoint: root.querySelector("#t_zonePoint"),
        uploadedLayer: root.querySelector("#uploadedLayer"),
        uploadedImg: root.querySelector("#uploadedImg"),
        phMain: root.querySelector("#phMain"),
        imgFrame: root.querySelector("#imgFrame")
      };
    }

    const nodesPreview2 = { current: null };
    const nodesCapture = { current: null };
    let dirty = true; // 文本/图片位置有变更但尚未生成导出PNG

    // 主题配色方案
    const themes = {
      default: {
        '--banner-top-strip': 'linear-gradient(90deg, #1B4F8A 0%, #2E7AD4 50%, #F07D1A 100%)',
        '--banner-bg': '#FFFFFF',
        '--banner-header-bg': '#F6F9FC',
        '--banner-slogan-bg': '#E8F1FA',
        '--banner-slogan-text': '#1B4F8A',
        '--banner-btn-bg': '#1B4F8A',
        '--banner-btn-text': '#FFFFFF',
        '--banner-tag-bg': '#1B4F8A',
        '--banner-tag-text': '#FFFFFF',
        '--banner-exam-text': '#F07D1A',
        '--banner-title-text': '#1B4F8A',
        '--banner-zone-text': '#64748B',
        '--banner-footer-text': '#94A3B8'
      },
      blue: {
        '--banner-top-strip': 'linear-gradient(90deg, #021024 0%, #052659 50%, #54B3B3 100%)',
        '--banner-bg': '#FFFFFF',
        '--banner-header-bg': '#F0F9FF',
        '--banner-slogan-bg': '#E0F2FE',
        '--banner-slogan-text': '#021024',
        '--banner-btn-bg': '#052659',
        '--banner-btn-text': '#FFFFFF',
        '--banner-tag-bg': '#052659',
        '--banner-tag-text': '#FFFFFF',
        '--banner-exam-text': '#54B3B3',
        '--banner-title-text': '#021024',
        '--banner-zone-text': '#64748B',
        '--banner-footer-text': '#94A3B8'
      },
      purple: {
        '--banner-top-strip': 'linear-gradient(90deg, #190019 0%, #2B124C 50%, #854F6C 100%)',
        '--banner-bg': '#FFFFFF',
        '--banner-header-bg': '#FDF4FF',
        '--banner-slogan-bg': '#F3E8FF',
        '--banner-slogan-text': '#2B124C',
        '--banner-btn-bg': '#2B124C',
        '--banner-btn-text': '#FFFFFF',
        '--banner-tag-bg': '#2B124C',
        '--banner-tag-text': '#FFFFFF',
        '--banner-exam-text': '#854F6C',
        '--banner-title-text': '#190019',
        '--banner-zone-text': '#64748B',
        '--banner-footer-text': '#94A3B8'
      },
      red: {
        '--banner-top-strip': 'linear-gradient(90deg, #2E365A 0%, #6B597F 50%, #BD6C73 100%)',
        '--banner-bg': '#FFFFFF',
        '--banner-header-bg': '#FEF2F2',
        '--banner-slogan-bg': '#FEE2E2',
        '--banner-slogan-text': '#2E365A',
        '--banner-btn-bg': '#BD6C73',
        '--banner-btn-text': '#FFFFFF',
        '--banner-tag-bg': '#2E365A',
        '--banner-tag-text': '#FFFFFF',
        '--banner-exam-text': '#BD6C73',
        '--banner-title-text': '#2E365A',
        '--banner-zone-text': '#64748B',
        '--banner-footer-text': '#94A3B8'
      },
      pink: {
        '--banner-top-strip': 'linear-gradient(90deg, #1F2544 0%, #474F7A 50%, #81689D 100%)',
        '--banner-bg': '#FFFFFF',
        '--banner-header-bg': '#FEF7FF',
        '--banner-slogan-bg': '#FDF2F8',
        '--banner-slogan-text': '#1F2544',
        '--banner-btn-bg': '#81689D',
        '--banner-btn-text': '#FFFFFF',
        '--banner-tag-bg': '#1F2544',
        '--banner-tag-text': '#FFFFFF',
        '--banner-exam-text': '#FFD0EC',
        '--banner-title-text': '#1F2544',
        '--banner-zone-text': '#64748B',
        '--banner-footer-text': '#94A3B8'
      }
    };

    // 应用主题
    function applyTheme(themeName) {
      const theme = themes[themeName] || themes.default;
      const root = document.documentElement;
      Object.entries(theme).forEach(([property, value]) => {
        root.style.setProperty(property, value);
      });
      dirty = true;
      renderAll();
    }

    function renderAll() {
      const preview2Root = $("banner-preview-2");
      const captureRoot = $("banner-capture");
      nodesPreview2.current = nodesPreview2.current || getNodes(preview2Root);
      nodesCapture.current = nodesCapture.current || getNodes(captureRoot);
      const np2 = nodesPreview2.current;
      const nc = nodesCapture.current;

      // 文本
      np2.tagHead.textContent = state.tagHead || "";
      nc.tagHead.textContent = state.tagHead || "";

      np2.examTitle.textContent = state.examTitle || "";
      nc.examTitle.textContent = state.examTitle || "";

      np2.cardTitle.textContent = state.cardTitle || "";
      nc.cardTitle.textContent = state.cardTitle || "";

      const s1 = (state.slogans[0] || "").trim();
      const s2 = (state.slogans[1] || "").trim();
      const s3 = (state.slogans[2] || "").trim();
      np2.slogan1.textContent = s1 || "";
      np2.slogan2.textContent = s2 || "";
      np2.slogan3.textContent = s3 || "";

      nc.slogan1.textContent = s1 || "";
      nc.slogan2.textContent = s2 || "";
      nc.slogan3.textContent = s3 || "";

      // 显示2或3条
      const has3 = !!s3;
      for (const n of [np2, nc]) {
        n.sloganSep1.style.display = "block";
        n.sloganSep2.style.display = has3 ? "block" : "none";
        n.slogan3.style.display = has3 ? "flex" : "none";
      }

      // 专题 & 考点
      const topic = (state.topic || "").trim();
      const point = (state.point || "").trim();
      const topicText = topic || "";
      np2.zoneLabel.textContent = topicText;
      nc.zoneLabel.textContent = topicText;

      if (point) {
        for (const n of [np2, nc]) {
          n.zonePoint.textContent = `·${point}`;
          n.zonePoint.style.display = "inline";
        }
        nc.zonePoint.textContent = `·${point}`;
        nc.zonePoint.style.display = "inline";
      } else {
        for (const n of [np2, nc]) {
          n.zonePoint.textContent = "";
          n.zonePoint.style.display = "none";
        }
      }

      // 上传图片：显示/隐藏
      const hasImg = !!state.imageDataUrl;
      for (const n of [np2, nc]) {
        n.phMain.style.display = hasImg ? "none" : "block";
        n.uploadedLayer.style.display = hasImg ? "block" : "none";
        if (hasImg) n.uploadedImg.src = state.imageDataUrl;
      }
      updateImageTransform(np2);
      updateImageTransform(nc);
    }

    function updateImageTransform(n) {
      if (!state.imageDataUrl) return;
      // baseFitScale：让图片“初始就覆盖”框（cover），userScale：用户在此基础上继续缩放
      const scale = state.baseFitScale * state.userScale;
      n.uploadedImg.style.setProperty("--scale", scale);
      n.uploadedImg.style.setProperty("--dx", `${state.dx}px`);
      n.uploadedImg.style.setProperty("--dy", `${state.dy}px`);
    }

    function bindImageDrag(previewRoot) {
      const np = getNodes(previewRoot);
      const frame = np.imgFrame;
      const layer = np.uploadedLayer;
      let dragging = false;
      let startX = 0, startY = 0;
      let startDx = 0, startDy = 0;

      function onPointerDown(e) {
        if (!state.imageDataUrl) return;
        // 只在图片层内触发
        if (e.target !== layer && !layer.contains(e.target)) return;
        dragging = true;
        frame.setPointerCapture?.(e.pointerId);
        startX = e.clientX;
        startY = e.clientY;
        startDx = state.dx;
        startDy = state.dy;
      }
      function onPointerMove(e) {
        if (!dragging) return;
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;
        state.dx = startDx + dx;
        state.dy = startDy + dy;
        // 更新预览节点和捕获节点
        updateImageTransform(np);
        if (nodesCapture.current) updateImageTransform(nodesCapture.current);
        dirty = true;
      }
      function onPointerUp(e) {
        dragging = false;
      }
      layer.addEventListener("pointerdown", onPointerDown);
      window.addEventListener("pointermove", onPointerMove);
      window.addEventListener("pointerup", onPointerUp);
    }

    function readFileAsDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = reject;
        reader.onload = () => resolve(reader.result);
        reader.readAsDataURL(file);
      });
    }

    async function onPickFile(file) {
      const dataUrl = await readFileAsDataURL(file);
      const img = new Image();
      img.decoding = "async";
      img.src = dataUrl;
      await img.decode();

      state.imageDataUrl = dataUrl;
      state.imgNatural = { w: img.naturalWidth || img.width, h: img.naturalHeight || img.height };

      // 初始 cover（让图片覆盖框）
      const coverScale = Math.max(FRAME_W / state.imgNatural.w, FRAME_H / state.imgNatural.h);
      state.baseFitScale = coverScale;
      state.userScale = 1;
      state.dx = 0;
      state.dy = 0;

      // UI
      $("imgTools").style.display = "flex";
      $("scaleRange").value = "1.00";
      $("scaleValue").textContent = "1.00×";
      $("btnResetImg").disabled = false;

      dirty = true;
      renderAll();
    }

    function syncPage1InputsToState() {
      const slogans = [
        $("slogan1").value,
        $("slogan2").value,
        $("slogan3").value
      ];
      state.tagHead = $("tagHead").value;
      state.cardTitle = $("cardTitle").value;
      state.examTitle = $("examTitle").value;
      state.slogans = slogans;
      state.topic = $("topic").value;
      state.point = $("point").value;
      dirty = true;
      renderAll();
    }

    function syncPage2InputsFromState() {
      $("tagHead2").value = state.tagHead;
      $("cardTitle2").value = state.cardTitle;
      $("examTitle2").value = state.examTitle;
      $("slogan1_2").value = state.slogans[0] || "";
      $("slogan2_2").value = state.slogans[1] || "";
      $("slogan3_2").value = state.slogans[2] || "";
      $("topic2").value = state.topic;
      $("point2").value = state.point;
    }

    function syncPage2InputsToState() {
      state.tagHead = $("tagHead2").value;
      state.cardTitle = $("cardTitle2").value;
      state.examTitle = $("examTitle2").value;
      state.slogans = [
        $("slogan1_2").value,
        $("slogan2_2").value,
        $("slogan3_2").value
      ];
      state.topic = $("topic2").value;
      state.point = $("point2").value;
      dirty = true;
      renderAll();
    }

    async function exportPNG() {
      const captureRoot = $("banner-capture");
      // 为了确保 750×906：直接使用元素本身尺寸，不额外缩放
      const canvas = await html2canvas(captureRoot, {
        backgroundColor: "null",
        scale: 1,
        useCORS: true,
        allowTaint: false,
        logging: false,
        removeContainer: false,
        width: 750,
        height: 906
      });

      return new Promise((resolve) => {
        canvas.toBlob((blob) => resolve({ blob, canvas }));
      });
    }

    function showGeneratedFromBlob(blob) {
      const url = URL.createObjectURL(blob);
      $("generatedImg").src = url;
      $("generatedImg").style.display = "block";
      $("generatedEmpty").style.display = "none";
      $("btnDownload").disabled = false;
      // 记录给下载用
      $("btnDownload").dataset.url = url;
      $("btnDownload").dataset.blobReady = "1";
      dirty = false;
    }

    function bindUI() {
      // mount
      mountTemplate();

      // init nodes
      nodesPreview2.current = null;
      nodesCapture.current = null;
      renderAll();

      // 初始化页面2输入框值
      syncPage2InputsFromState();

      // 主题选择器
      $("themeSelector").addEventListener("change", (e) => {
        applyTheme(e.target.value);
      });

      // pick file
      $("btnPick").addEventListener("click", () => $("fileInput").click());
      $("fileInput").addEventListener("change", async (e) => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        if (!file.type.startsWith("image/")) {
          alert("请选择图片文件");
          return;
        }
        await onPickFile(file);
      });

      // scale slider
      $("scaleRange").addEventListener("input", () => {
        const v = parseFloat($("scaleRange").value);
        state.userScale = v;
        $("scaleValue").textContent = `${v.toFixed(2)}×`;
        const previewRoot = $("banner-preview-2");
        const np = getNodes(previewRoot);
        updateImageTransform(np);
        dirty = true;
        renderAll(); // 同步到 capture
      });
      $("btnResetImg").addEventListener("click", () => {
        state.userScale = 1;
        state.dx = 0;
        state.dy = 0;
        $("scaleRange").value = "1.00";
        $("scaleValue").textContent = "1.00×";
        dirty = true;
        renderAll();
      });

      // Page2 inputs -> state (实时同步预览)
      const page2Ids = ["tagHead2", "cardTitle2", "examTitle2", "slogan1_2", "slogan2_2", "slogan3_2", "topic2", "point2"];
      page2Ids.forEach(id => {
        $(id).addEventListener("input", () => syncPage2InputsToState());
      });

      // Generate/download
      let lastBlob = null;
      $("btnGenerate").addEventListener("click", async () => {
        $("btnGenerate").disabled = true;
        $("btnDownload").disabled = true;
        try {
          const { blob } = await exportPNG();
          showGeneratedFromBlob(blob);
        } catch (err) {
          console.error(err);
          alert("生成失败，请稍后重试。");
        } finally {
          $("btnGenerate").disabled = false;
        }
      });

      $("btnDownload").addEventListener("click", () => {
        (async () => {
          try {
            $("btnDownload").disabled = true;

            // 如果已经有最新导出（dirty=false），直接下载；否则先重新导出再下载
            if (dirty || !$("btnDownload").dataset.url) {
              const { blob } = await exportPNG();
              showGeneratedFromBlob(blob);
            }

            const url = $("btnDownload").dataset.url;
            if (!url) return;

            const a = document.createElement("a");
            a.href = url;
            a.download = "knowledge-card-750x906.png";
            document.body.appendChild(a);
            a.click();
            a.remove();
          } finally {
            $("btnDownload").disabled = false;
          }
        })();
      });
    }

    // init
    bindUI();
  </script>
